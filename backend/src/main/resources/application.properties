# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=demo-4
server.port=8081

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.main.allow-circular-references=true

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# ============================================
# STATIC RESOURCES CONFIGURATION
# ============================================
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.example.demo=DEBUG
logging.level.com.example.demo.controller=DEBUG
logging.level.com.example.demo.service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================
# ERROR HANDLING
# ============================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# ============================================
# SERVER CONFIGURATION
# ============================================
server.tomcat.max-connections=10000
server.tomcat.max-http-post-size=5MB

# ============================================
# CORS CONFIGURATION
# ============================================
# Permettre les requêtes depuis Vercel
spring.web.cors.allowed-origins=https://mon-projet-backend-frontend.vercel.app,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ============================================
# IMAGE SPECIFIC CONFIGURATION
# ============================================
image.base-url=https://evenix-backend.onrender.com/files/
image.upload-dir=uploads/images/
image.allowed-extensions=jpg,jpeg,png,gif,webp,bmp
image.max-size-mb=10

# ============================================
# SWAGGER CONFIGURATION
# ============================================
springdoc.swagger-ui.path=/swagger-ui.html