# ============================================
# PRODUCTION CONFIGURATION
# ============================================
spring.application.name=demo-4
server.port=8081

# ============================================
# DATABASE CONFIGURATION - PRODUCTION
# ============================================
# À configurer avec vos variables d'environnement Render
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/projet_DB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.main.allow-circular-references=true

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# ============================================
# STATIC RESOURCES CONFIGURATION
# ============================================
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# ============================================
# LOGGING CONFIGURATION - PRODUCTION
# ============================================
logging.level.com.example.demo=INFO
logging.level.com.example.demo.controller=INFO
logging.level.com.example.demo.service=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN

# ============================================
# ERROR HANDLING
# ============================================
server.error.include-message=always
server.error.include-stacktrace=never
server.error.include-exception=false
